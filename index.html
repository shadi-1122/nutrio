<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fresh Fruits Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #22c55e;
    --green-light: #dcfce7;
    --green-mid: #86efac;
    --green-dark: #15803d;
    --bg: #f9fafb;
    --surface: #ffffff;
    --text: #111827;
    --text-secondary: #6b7280;
    --text-caption: #9ca3af;
    --border: #f3f4f6;
    --shadow: 0 8px 24px rgba(0,0,0,0.06);
    --shadow-hover: 0 12px 32px rgba(0,0,0,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-pill: 999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }
  .sp {
    color: var(--green);
    font-weight: 500;
    text-decoration: none;
  }

  /* === HERO === */
  .hero {
    background: var(--surface);
    padding: 48px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--green-dark);
    background: var(--green-light);
    padding: 5px 14px;
    border-radius: var(--radius-pill);
    margin-bottom: 20px;
    letter-spacing: 0.04em;
  }
  .hero-label::before { content: '🌿'; font-size: 13px; }
  .hero h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--green); }
  .hero-sub {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
    max-width: 340px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* === FILTER BAR === */
  .filter-bar {
    background: var(--surface);
    justify-content: center;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 4px;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 14px 18px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s ease;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active {
    color: var(--green);
    border-bottom-color: var(--green);
    font-weight: 500;
  }

  /* === MENU WRAPPER === */
  .menu-wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .section-count {
    font-size: 12px;
    color: var(--text-caption);
    font-weight: 400;
    background: var(--surface);
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
  }

  /* === FRUIT GRID === */
  .fruits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .fruit-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .fruit-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
  .fruit-item:active { transform: scale(0.97); }
  .fruit-item.selected {
    border-color: var(--green);
    box-shadow: 0 8px 24px rgba(34,197,94,0.15);
  }

  .fruit-icon {
    font-size: 32px;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--green-light);
    border-radius: 16px;
  }
  .fruit-info { flex: 1; min-width: 0; }
  .fruit-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .fruit-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fruit-cal {
    font-size: 12px;
    font-weight: 500;
    color: var(--green-dark);
    background: var(--green-light);
    padding: 2px 9px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .fruit-tagline {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .fruit-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 10px;
    font-weight: 400;
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    background: var(--bg);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .fruit-arrow {
    color: var(--text-caption);
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.18s ease, color 0.18s ease;
    line-height: 1;
  }
  .fruit-item:hover .fruit-arrow,
  .fruit-item.selected .fruit-arrow {
    transform: translateX(3px);
    color: var(--green);
  }

  /* === DETAIL PANEL === */
  .detail-panel {
    display: none;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-hover);
    overflow: hidden;
    margin-bottom: 24px;
    animation: slideDown 0.22s ease;
  }
  .detail-panel.open { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-top {
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 60%);
  }
  .detail-emoji {
    font-size: 52px;
    width: 80px;
    height: 80px;
    background: var(--green-light);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .detail-headline { flex: 1; min-width: 0; }
  .detail-name {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }
  .detail-desc {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .detail-badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .detail-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    background: var(--green-light);
    color: var(--green-dark);
    border: 1px solid var(--green-mid);
  }
  .detail-close {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, transform 0.15s;
    line-height: 1;
  }
  .detail-close:hover {
    background: #fee2e2;
    color: #ef4444;
    border-color: #fecaca;
    transform: scale(1.08);
  }

  .detail-body { padding: 24px; }

  .detail-section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-caption);
    margin-bottom: 14px;
  }

  .nutrition-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .nutrition-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    border: 1px solid var(--border);
    transition: box-shadow 0.15s;
  }
  .nutrition-card:hover { box-shadow: var(--shadow); }
  .nutrition-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-caption);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .nutrition-value {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }
  .nutrition-unit {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-caption);
    margin-left: 2px;
  }

  .bar-section { margin-bottom: 28px; }
  .bar-row { margin-bottom: 14px; }
  .bar-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .bar-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .bar-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .bar-track {
    height: 6px;
    background: var(--bg);
    border-radius: var(--radius-pill);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    background: var(--green);
    transition: width 0.5s cubic-bezier(0.25,0.8,0.25,1);
  }

  .benefits-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .benefit-pill {
    font-size: 13px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: var(--radius-pill);
    background: var(--bg);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .benefit-pill:hover {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green-mid);
  }
  .benefit-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .fruit-item.hidden { display: none; }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    font-weight: 300;
    color: var(--text-caption);
    background: var(--surface);
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .fruits-grid { grid-template-columns: 1fr; }
    .hero { padding: 36px 20px 32px; }
    .menu-wrapper { padding: 24px 12px 64px; }
    .nutrition-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>
</head>

let selectedFruit = null;

function renderFruits(filter = 'all') {
  const grid = document.getElementById('fruitsGrid');
  const visible = filter === 'all' ? fruits : fruits.filter(f => f.category === filter || f.category === 'all' || filter === 'all');
  const shown = fruits.filter(f => filter === 'all' ? true : f.category === filter);
  document.getElementById('countLabel').textContent = shown.length + ' fruit' + (shown.length !== 1 ? 's' : '');

  grid.innerHTML = fruits.map((f, i) => {
    const hidden = filter !== 'all' && f.category !== filter;
    return `
    <div class="fruit-item${hidden ? ' hidden' : ''}${selectedFruit === f.name ? ' selected' : ''}"
         data-name="${f.name}" onclick="toggleDetail('${f.name}')"
         style="animation: fadeIn 0.3s ease ${(i % 10) * 0.03}s both;">
      <div class="fruit-icon">${f.emoji}</div>
      <div class="fruit-info">
        <div class="fruit-name-row">
          <span class="fruit-name">${f.name}</span>
          <span class="fruit-cal">${f.cal} kcal</span>
        </div>
        <div class="fruit-tagline">${f.tagline}</div>
        <div class="fruit-tags">
          ${f.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
      <span class="fruit-arrow">›</span>
    </div>`;
  }).join('');
}

function toggleDetail(name) {
  if (selectedFruit === name) {
    selectedFruit = null;
    document.getElementById('detailPanel').classList.remove('open');
    renderFruits(activeFilter);
    return;
  }
  selectedFruit = name;
  renderFruits(activeFilter);
  showDetail(fruits.find(f => f.name === name));
}

function showDetail(f) {
  const panel = document.getElementById('detailPanel');
  const maxes = { carbs: 30, protein: 5, fat: 35, fiber: 10 };

  panel.innerHTML = `
    <div class="detail-top">
      <div class="detail-emoji">${f.emoji}</div>
      <div class="detail-headline">
        <div class="detail-name">${f.name}</div>
        <div class="detail-desc">${f.tagline} — ${f.cal} kcal per 100g · GI: ${f.gi} · ${f.water}% water</div>
        <div class="detail-badges">
          ${f.tags.map(t => `<span class="detail-badge">${t}</span>`).join('')}
        </div>
      </div>
      <button class="detail-close" onclick="toggleDetail('${f.name}')">×</button>
    </div>
    <div class="detail-body">
      <p class="detail-section-label">Full Nutrition per 100g</p>
      <div class="nutrition-grid">
        ${[
          ['Calories','kcal',f.cal],
          ['Protein','g',f.protein],
          ['Carbs','g',f.carbs],
          ['Fat','g',f.fat],
          ['Fiber','g',f.fiber],
          ['Sugar','g',f.sugar],
          ['Vitamin C','mg',f.vitC],
          ['Potassium','mg',f.potassium],
          ['Water','%',f.water],
          ['Glycemic Index','GI',f.gi],
        ].map(([l,u,v]) => `
          <div class="nutrition-card">
            <div class="nutrition-label">${l}</div>
            <div class="nutrition-value">${v}<span class="nutrition-unit">${u}</span></div>
          </div>`).join('')}
      </div>

      <p class="detail-section-label">Macro Breakdown</p>
      <div class="bar-section">
        ${[['Carbohydrates',f.carbs,maxes.carbs,'g'],['Protein',f.protein,maxes.protein,'g'],['Fat',f.fat,maxes.fat,'g'],['Dietary Fiber',f.fiber,maxes.fiber,'g']].map(([l,v,m,u]) => `
        <div class="bar-row">
          <div class="bar-meta"><span class="bar-name">${l}</span><span class="bar-val">${v}${u}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,v/m*100).toFixed(1)}%"></div></div>
        </div>`).join('')}
      </div>

      <p class="detail-section-label">Health Benefits</p>
      <div class="benefits-grid">
        ${f.benefits.map(b => `<span class="benefit-pill">${b}</span>`).join('')}
      </div>
    </div>`;

  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

let activeFilter = 'all';

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  selectedFruit = null;
  document.getElementById('detailPanel').classList.remove('open');
  renderFruits(activeFilter);
});

const style = document.createElement('style');
style.textContent = '@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }';
document.head.appendChild(style);

renderFruits();
</script>
